logLevel: info

# Survive Starlink satellite handovers (200-500ms freezes every ~15s)
readTimeout: 30s
writeTimeout: 30s
writeQueueSize: 128

srt: yes
srtAddress: :8890

rtsp: yes
rtspTransports: [udp,tcp]    # TCP is right for Starlink — UDP loses too many packets on handover

webrtc: yes
# If WebRTC clients connect from outside your LAN, list the server's public hostname/IP here:
# webrtcAdditionalHosts: [stream.example.com]
webrtcICEServers2:
  - url: stun:stun.l.google.com:19302
  # For external clients also behind NAT/CGNAT, add a TURN server:
  # - url: turn:turn.example.com:3478
  #   username: turnuser
  #   password: turnpass

api: yes
apiAddress: :9997

paths:

